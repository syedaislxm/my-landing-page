<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Sprite Test</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #444; image-rendering: pixelated; }
    </style>
</head>
<body>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: '#87CEEB', // Sky blue
        parent: 'phaser-example',
        pixelArt: true, // Keeps the pixel art crisp
        scene: {
            preload: preload,
            create: create
        }
    };

    const game = new Phaser.Game(config);

    function preload() {
        // Replace 'frog_sheet.png' with your actual filename
        // Assuming each frog is roughly 100x100 pixels based on the grid
        this.load.spritesheet('frog', 'frog_sheet.png', { 
            frameWidth: 128, 
            frameHeight: 128 
        });
    }

    function create() {
        // 1. Create the Idle Animation (Row 1: Frames 0-5)
        this.anims.create({
            key: 'idle',
            frames: this.anims.generateFrameNumbers('frog', { start: 0, end: 5 }),
            frameRate: 8,
            repeat: -1
        });

        // 2. Create the Walk Animation (Row 2: Frames 6-11)
        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('frog', { start: 6, end: 11 }),
            frameRate: 10,
            repeat: -1
        });

        // 3. Place the frogs on screen
        const idleFrog = this.add.sprite(300, 300, 'frog').setScale(2);
        const walkingFrog = this.add.sprite(500, 300, 'frog').setScale(2);

        // 4. Play the animations
        idleFrog.play('idle');
        walkingFrog.play('walk');

        // Add some text
        this.add.text(260, 400, 'Idle State', { fontSize: '20px', fill: '#000' });
        this.add.text(460, 400, 'Walking State', { fontSize: '20px', fill: '#000' });
    }
</script>

</body>
</html>
