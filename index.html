<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>For Olivia</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #0d1b0e;
  --sky1:     #0a1f2e;
  --sky2:     #0d2e1a;
  --moon:     #e8d87a;
  --tree1:    #0a2010;
  --tree2:    #0d2e14;
  --tree3:    #122e18;
  --ground:   #1a3d1a;
  --grass:    #2d5a2d;
  --ff:       #c8ff50;
  --cream:    #f5edd6;
  --gold:     #f0a830;
  --gold2:    #c87820;
  --sage:     #7ab870;
  --dark-txt: #1a0a00;
  --pixel:    'Press Start 2P', monospace;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:var(--pixel);
  image-rendering:pixelated;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  cursor:default;
}

/* ═══════════════════════════════
   PIXEL BACKGROUND — layered
═══════════════════════════════ */
#world{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
}

/* Sky gradient */
#sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #050f18 0%,
    #0a1f2e 35%,
    #0d2e1a 70%,
    #0a1a0e 100%);
}

/* Moon */
#moon-el{
  position:absolute;
  top:6%;left:50%;transform:translateX(-50%);
  width:48px;height:48px;
  background:var(--moon);
  box-shadow:0 0 0 4px #f5e87a,0 0 20px 8px rgba(232,216,122,0.4);
  clip-path:polygon(
    25% 0%,75% 0%,
    100% 25%,100% 75%,
    75% 100%,25% 100%,
    0% 75%,0% 25%
  );
  animation:moonGlow 3s ease-in-out infinite alternate;
}
@keyframes moonGlow{
  from{box-shadow:0 0 0 4px #f5e87a,0 0 20px 8px rgba(232,216,122,0.3);}
  to  {box-shadow:0 0 0 4px #f5e87a,0 0 36px 14px rgba(232,216,122,0.55);}
}

/* Stars */
.px-star{
  position:absolute;
  background:#fff;
  animation:starTwinkle var(--st) ease-in-out infinite alternate;
  animation-delay:var(--sd);
}
@keyframes starTwinkle{from{opacity:0.15;}to{opacity:0.9;}}

/* Ground */
#ground{
  position:absolute;
  bottom:0;left:0;right:0;height:18%;
  background:linear-gradient(180deg, var(--ground) 0%, #0f2010 100%);
  border-top:4px solid var(--grass);
}

/* Fireflies */
.firefly{
  position:absolute;
  width:4px;height:4px;
  background:var(--ff);
  box-shadow:0 0 4px 2px rgba(200,255,80,0.8),0 0 8px 4px rgba(200,255,80,0.3);
  animation:ffFly var(--fd) ease-in-out infinite,
            ffBlink var(--fb) ease-in-out infinite;
  opacity:0;
}
@keyframes ffFly{
  0%  {transform:translate(0,0);}
  25% {transform:translate(var(--fx1),var(--fy1));}
  50% {transform:translate(var(--fx2),var(--fy2));}
  75% {transform:translate(var(--fx3),var(--fy3));}
  100%{transform:translate(0,0);}
}
@keyframes ffBlink{0%,100%{opacity:0;}35%,65%{opacity:1;}50%{opacity:0.3;}}

/* ═══════════════════════════════
   FROG CHARACTER
═══════════════════════════════ */
#frog-char{
  position:fixed;
  bottom:18%;
  left:-120px;
  z-index:20;
  transition:left 0.8s cubic-bezier(0.25,0.1,0.25,1);
  transform-origin:bottom center;
}
#frog-char canvas{
  image-rendering:pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
  display:block;
}

/* Idle bob */
.frog-idle{animation:frogIdle 0.9s ease-in-out infinite alternate;}
@keyframes frogIdle{from{transform:translateY(0);}to{transform:translateY(-4px);}}

/* Walk */
.frog-walk{animation:frogWalk 0.35s steps(1) infinite;}
@keyframes frogWalk{
  0%  {transform:translateY(0)   scaleX(1);}
  25% {transform:translateY(-5px) scaleX(0.96);}
  50% {transform:translateY(0)   scaleX(1.04);}
  75% {transform:translateY(-3px) scaleX(0.98);}
}

/* Wave */
.frog-wave{animation:frogWave 0.6s ease-in-out 3;}
@keyframes frogWave{
  0%,100%{transform:translateY(0) rotate(0deg);}
  25%    {transform:translateY(-6px) rotate(-5deg);}
  75%    {transform:translateY(-2px) rotate(4deg);}
}

/* Happy hop */
.frog-happy{animation:frogHappy 0.5s cubic-bezier(0.34,1.6,0.64,1) infinite alternate;}
@keyframes frogHappy{
  from{transform:translateY(0) rotate(-4deg) scale(1);}
  to  {transform:translateY(-14px) rotate(4deg) scale(1.06);}
}

/* ═══════════════════════════════
   UI OVERLAY
═══════════════════════════════ */
#ui{
  position:fixed;inset:0;z-index:30;
  pointer-events:none;
  display:flex;flex-direction:column;
  align-items:center;
  padding:clamp(14px,5vw,28px) clamp(14px,5vw,28px) 0;
}

#title-block{
  text-align:center;
  margin-bottom:clamp(8px,3vw,18px);
  opacity:0;
  animation:titleDrop 0.6s 0.3s cubic-bezier(0.34,1.3,0.64,1) forwards;
}
@keyframes titleDrop{
  from{opacity:0;transform:translateY(-30px);}
  to  {opacity:1;transform:translateY(0);}
}

.title-shadow{
  font-family:var(--pixel);
  font-size:clamp(20px,6.5vw,42px);
  color:var(--gold);
  text-shadow:
    3px 3px 0 var(--gold2),
    6px 6px 0 #7a3a00,
    -1px -1px 0 #f8c848;
  letter-spacing:0.06em;
  line-height:1.3;
}

.title-sub{
  font-family:var(--pixel);
  font-size:clamp(7px,2vw,11px);
  color:var(--sage);
  margin-top:8px;
  letter-spacing:0.1em;
}

/* Dialogue bubble */
#dialogue{
  position:fixed;
  z-index:31;
  pointer-events:all;
  opacity:0;
  transition:opacity 0.35s;
  width:min(72vw,320px);
}
#dialogue.show{opacity:1;}

.dialogue-box{
  background:#0a1a0a;
  border:4px solid var(--sage);
  outline:4px solid #0a1a0a;
  box-shadow:0 0 0 8px var(--sage), 4px 4px 0 0 #000;
  padding:clamp(10px,3.5vw,16px) clamp(12px,4vw,18px);
  position:relative;
}

.bubble-tail{
  position:absolute;
  bottom:-24px;
  left:clamp(20px, 30%, 60px);
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid var(--sage);
  filter:drop-shadow(4px 4px 0 #000);
}

.dialogue-name{
  font-family:var(--pixel);
  font-size:clamp(6px,1.8vw,8px);
  color:var(--gold);
  margin-bottom:8px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.dialogue-text{
  font-family:var(--pixel);
  font-size:clamp(6px,2vw,9px);
  color:var(--cream);
  line-height:1.9;
  letter-spacing:0.04em;
  min-height:clamp(50px,12vw,80px);
}

.continue-prompt{
  display:block;
  margin-top:8px;
  font-size:clamp(5px,1.6vw,7px);
  color:var(--sage);
  text-align:right;
  animation:blinker 0.8s steps(1) infinite;
}
@keyframes blinker{0%,100%{opacity:1;}50%{opacity:0;}}

/* Action buttons */
#action-btns{
  position:fixed;
  bottom:clamp(18px,6vw,34px);
  left:50%;transform:translateX(-50%);
  display:flex;gap:clamp(12px,4vw,24px);
  z-index:31;
  opacity:0;
  transition:opacity 0.4s;
}
#action-btns.show{opacity:1;pointer-events:all;}

.px-btn{
  font-family:var(--pixel);
  font-size:clamp(8px,2.5vw,12px);
  padding:clamp(10px,3vw,14px) clamp(18px,5vw,28px);
  border:none;cursor:pointer;
  outline:4px solid #000;
  box-shadow:4px 4px 0 #000;
  letter-spacing:0.06em;
  transition:transform 0.1s,box-shadow 0.1s;
}
.px-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}

#btn-yes{
  background:var(--gold);
  color:var(--dark-txt);
  animation:yesFlash 1.8s ease-in-out infinite;
}
@keyframes yesFlash{
  0%,100%{background:var(--gold);}
  50%    {background:#f8d848;}
}

#btn-no{
  background:#2a3a2a;
  color:#7ab870;
  position:fixed;
  z-index:32;
  outline:4px solid #000;
  box-shadow:4px 4px 0 #000;
  font-family:var(--pixel);
  font-size:clamp(7px,2.2vw,10px);
  padding:clamp(8px,2.5vw,12px) clamp(14px,4vw,22px);
  border:none;cursor:pointer;
  letter-spacing:0.05em;
}

/* YES SCREEN */
#yes-screen{
  position:fixed;inset:0;z-index:50;
  background:#050f07;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity 0.8s;
}
#yes-screen.show{opacity:1;pointer-events:all;}

.yes-title{
  font-family:var(--pixel);
  font-size:clamp(18px,5.5vw,34px);
  color:var(--gold);
  text-shadow:3px 3px 0 var(--gold2),6px 6px 0 #5a2800;
  margin-bottom:16px;
  animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
.yes-sub{
  font-family:var(--pixel);
  font-size:clamp(6px,2vw,9px);
  color:var(--sage);
  line-height:2.2;
  animation:popIn 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
#yes-frog{
  margin-bottom:18px;
  image-rendering:pixelated;
  animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both,
            frogHappy 0.5s 0.7s cubic-bezier(0.34,1.6,0.64,1) infinite alternate;
  filter:drop-shadow(0 0 14px rgba(200,255,80,0.7));
}
@keyframes popIn{from{opacity:0;transform:scale(0.4);}to{opacity:1;transform:scale(1);}}

.confetti-piece{
  position:fixed;top:-40px;
  font-family:var(--pixel);
  font-size:clamp(12px,4vw,20px);
  z-index:100;pointer-events:none;
  animation:cFall var(--cf) linear forwards;
}
@keyframes cFall{
  0%  {transform:translateY(0) rotate(0);opacity:1;}
  85% {opacity:1;}
  100%{transform:translateY(110vh) rotate(var(--cs));opacity:0;}
}

#loading{
  position:fixed;inset:0;z-index:100;
  background:#0a1a0a;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--pixel);
  font-size:clamp(10px,3vw,14px);
  color:var(--sage);
  opacity:1;
  transition:opacity 0.5s;
}
#loading.hide{opacity:0;pointer-events:none;}
</style>
</head>
<body>

<div id="loading">✨ Loading enchanted forest... ✨</div>

<!-- WORLD -->
<div id="world">
  <div id="sky"></div>
  <div id="moon-el"></div>
  <div id="ground"></div>
</div>

<!-- FROG -->
<div id="frog-char">
  <canvas id="frog-canvas" width="64" height="64" style="width:96px;height:96px;"></canvas>
</div>

<!-- UI -->
<div id="ui">
  <div id="title-block">
    <div class="title-shadow" id="main-title">THE FROG'S QUEST</div>
    <div class="title-sub" id="main-sub">~ an enchanted forest adventure ~</div>
  </div>
</div>

<!-- DIALOGUE -->
<div id="dialogue">
  <div class="dialogue-box">
    <div class="dialogue-name" id="dlg-name">🐸 RIBBIT</div>
    <div class="dialogue-text" id="dlg-text"></div>
    <span class="continue-prompt">▼ TAP TO CONTINUE</span>
    <div class="bubble-tail"></div>
  </div>
</div>

<!-- BUTTONS -->
<div id="action-btns">
  <button class="px-btn" id="btn-yes" onclick="sayYes()">[ YES!! 🌻 ]</button>
</div>
<button id="btn-no">[ NO 🐸 ]</button>

<!-- YES SCREEN -->
<div id="yes-screen">
  <canvas id="yes-frog" width="64" height="64" style="width:96px;height:96px;"></canvas>
  <div class="yes-title">QUEST COMPLETE!!</div>
  <div class="yes-sub">
    ★ OLIVIA SAID YES ★<br><br>
    THE FOREST REJOICES...<br>
    THE MUSHROOMS CHEER...<br><br>
    <span style="color:var(--gold)">+ 9999 HAPPINESS POINTS</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  NANO BANANA FROG SPRITE SYSTEM
// ════════════════════════════════════════════

const SPRITE_CONFIG = {
  sheet: null,
  spriteWidth: 64,
  spriteHeight: 64,
  loaded: false
};

const SPRITE_MAP = {
  idle: [
    { row: 0, col: 0 },
    { row: 0, col: 1 },
    { row: 0, col: 2 },
    { row: 0, col: 3 },
    { row: 0, col: 4 },
    { row: 0, col: 5 }
  ],
  
  walkLeft: [
    { row: 1, col: 0 },
    { row: 1, col: 1 },
    { row: 1, col: 2 },
    { row: 1, col: 3 },
    { row: 1, col: 4 },
    { row: 1, col: 5 }
  ],
  
  walkRight: [
    { row: 2, col: 0 },
    { row: 2, col: 1 },
    { row: 2, col: 2 },
    { row: 2, col: 3 },
    { row: 2, col: 4 },
    { row: 2, col: 5 }
  ],
  
  waving:      { row: 4, col: 1 },
  happy:       { row: 3, col: 1 },
  embarrassed: { row: 3, col: 4 },
  celebrating: { row: 3, col: 5 }
};

let currentFrame = 0;
let animTimer = 0;
let animationLoop = null;

const frogCanvas = document.getElementById('frog-canvas');
const yesFrog = document.getElementById('yes-frog');
const ctx = frogCanvas.getContext('2d');
const yesCtx = yesFrog.getContext('2d');
ctx.imageSmoothingEnabled = false;
yesCtx.imageSmoothingEnabled = false;

// Load sprite sheet
function loadFrogSprites() {
  const img = new Image();
  img.onload = () => {
    SPRITE_CONFIG.sheet = img;
    SPRITE_CONFIG.loaded = true;
    console.log('✅ Frog loaded!');
    
    // Show first idle frame
    drawFrogSprite(frogCanvas, SPRITE_MAP.idle[0]);
    drawFrogSprite(yesFrog, SPRITE_MAP.happy);
    
    // Hide loading, start game
    document.getElementById('loading').classList.add('hide');
    setTimeout(startGame, 600);
  };
  
  img.onerror = () => {
    console.error('❌ Failed to load frog-sprites.png');
    document.getElementById('loading').textContent = '❌ Error: Put frog-sprites.png in same folder!';
  };
  
  img.src = 'frog-sprites.png';
}

// Draw sprite
function drawFrogSprite(canvas, spritePos) {
  if (!SPRITE_CONFIG.loaded) return;
  
  const { spriteWidth, spriteHeight } = SPRITE_CONFIG;
  const sx = spritePos.col * spriteWidth;
  const sy = spritePos.row * spriteHeight;
  
  const localCtx = canvas.getContext('2d');
  localCtx.clearRect(0, 0, canvas.width, canvas.height);
  localCtx.drawImage(
    SPRITE_CONFIG.sheet,
    sx, sy,
    spriteWidth, spriteHeight,
    0, 0,
    canvas.width, canvas.height
  );
}

// Animate frames
function animateFrog(animName, speed = 8) {
  const frames = SPRITE_MAP[animName];
  if (!frames) return;
  
  animTimer++;
  if (animTimer >= speed) {
    animTimer = 0;
    currentFrame = (currentFrame + 1) % frames.length;
  }
  
  drawFrogSprite(frogCanvas, frames[currentFrame]);
}

function startAnimation(animName, speed = 8) {
  stopAnimation();
  currentFrame = 0;
  animTimer = 0;
  
  animationLoop = setInterval(() => {
    animateFrog(animName, speed);
  }, 1000 / 60);
}

function stopAnimation() {
  if (animationLoop) {
    clearInterval(animationLoop);
    animationLoop = null;
  }
}

function showSprite(spriteName) {
  stopAnimation();
  drawFrogSprite(frogCanvas, SPRITE_MAP[spriteName]);
}

// ════════════════════════════════════════════
//  GAME SCENES
// ════════════════════════════════════════════

let currentScene = 0;
let sceneReady = false;

const frogChar = document.getElementById('frog-char');
const dialogue = document.getElementById('dialogue');
const dlgText = document.getElementById('dlg-text');
const dlgName = document.getElementById('dlg-name');

const SCENES = [
  {
    title: 'THE FROG\'S QUEST',
    sub: '~ an enchanted forest adventure ~',
    frogX: 38,
    sprite: 'waving',
    anim: 'frog-wave',
    name: '🐸 RIBBIT THE FROG',
    text: 'Greetings, traveller... *hops excitedly*\nI have journeyed far through this enchanted forest tonight... just to find YOU, Olivia.',
  },
  {
    title: 'THE FROG\'S QUEST',
    sub: '~ chapter 1: the question ~',
    frogX: 44,
    sprite: 'idle',
    anim: 'frog-idle',
    name: '🐸 RIBBIT',
    text: '*places hand on heart*\nYou have a kind of magic, Olivia.\nThe gentle kind.\nThe kind that turns ordinary moments into something storybook and golden. ✨',
  },
  {
    title: 'THE FROG\'S QUEST',
    sub: '~ the moment of truth ~',
    frogX: 44,
    sprite: 'idle',
    anim: 'frog-idle',
    name: '🐸 RIBBIT',
    text: '"TO MY HONOURABLE DARLING, OLIVIA…"\n\n…Will you be my girlfriend?\n\n*the whole forest holds its breath* 🍄✨',
    showButtons: true
  },
];

function setFrogAnim(anim){
  frogChar.classList.remove('frog-idle','frog-wave','frog-happy','frog-walk');
  frogChar.classList.add(anim);
}

function typeText(txt, el, cb){
  el.innerHTML = '';
  let i = 0;
  const text = txt.replace(/\n/g, '<br>');
  
  function type(){
    if(i < text.length){
      if(text[i] === '<'){
        const end = text.indexOf('>', i);
        el.innerHTML += text.substring(i, end+1);
        i = end+1;
      } else {
        el.innerHTML += text[i];
        i++;
      }
      setTimeout(type, 40);
    } else {
      if(cb) cb();
    }
  }
  type();
}

function positionBubble(){
  const frogRect = frogChar.getBoundingClientRect();
  const bubbleW = dialogue.offsetWidth || 280;
  const bubbleH = dialogue.offsetHeight || 140;
  
  let bLeft = frogRect.left + frogRect.width/2 - bubbleW * 0.3;
  bLeft = Math.max(8, Math.min(bLeft, window.innerWidth - bubbleW - 8));
  
  let bTop = frogRect.top - bubbleH - 60;
  bTop = Math.max(80, bTop);
  
  dialogue.style.left = bLeft + 'px';
  dialogue.style.top  = bTop  + 'px';
  dialogue.style.bottom = 'auto';
  dialogue.style.transform = 'none';
}

function showScene(n){
  currentScene = n;
  const sc = SCENES[n];
  sceneReady = false;
  
  document.getElementById('main-title').textContent = sc.title;
  document.getElementById('main-sub').textContent = sc.sub;
  
  dialogue.classList.remove('show');
  document.getElementById('action-btns').classList.remove('show');
  document.getElementById('btn-no').style.display = 'none';
  
  // Position frog
  frogChar.style.left = sc.frogX + 'vw';
  
  // Show sprite
  if(sc.sprite === 'idle'){
    startAnimation('idle', 12);
  } else {
    showSprite(sc.sprite);
  }
  
  setFrogAnim(sc.anim);
  
  setTimeout(()=>{
    dlgName.textContent = sc.name;
    positionBubble();
    dialogue.classList.add('show');
    
    typeText(sc.text, dlgText, ()=>{
      sceneReady = true;
      if(sc.showButtons){
        document.getElementById('action-btns').classList.add('show');
        document.getElementById('btn-no').style.display = 'block';
        initNoButton();
      }
    });
  }, 300);
}

// Advance scene
function advance(){
  if(!sceneReady) return;
  if(currentScene < SCENES.length-1){
    showScene(currentScene+1);
  }
}

document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Enter') advance();
});
document.addEventListener('click', e=>{
  if(e.target.closest('button')) return;
  advance();
});

// ════════════════════════════════════════════
//  NO BUTTON DODGE
// ════════════════════════════════════════════

const btnNo = document.getElementById('btn-no');
let noReady = false;

function initNoButton(){
  noReady = true;
  setTimeout(()=>{
    const yes = document.getElementById('btn-yes').getBoundingClientRect();
    btnNo.style.top = yes.top + 'px';
    btnNo.style.left = (yes.right + 16) + 'px';
  }, 60);
}

function moveNo(){
  const m = 20;
  const bw = btnNo.offsetWidth || 90;
  const bh = btnNo.offsetHeight || 40;
  
  const nx = m + Math.random() * (window.innerWidth - bw - m*2);
  const ny = m + Math.random() * (window.innerHeight - bh - m*2);
  
  btnNo.style.top = ny + 'px';
  btnNo.style.left = nx + 'px';
}

function onNoDodge(e){
  if(!noReady) return;
  if(e) e.preventDefault();
  
  showSprite('embarrassed');
  setFrogAnim('frog-idle');
  
  setTimeout(()=>{
    startAnimation('idle', 12);
  }, 800);
  
  moveNo();
}

btnNo.addEventListener('touchstart', onNoDodge, {passive:false});
btnNo.addEventListener('mouseover', onNoDodge);
btnNo.addEventListener('click', onNoDodge);

// ════════════════════════════════════════════
//  YES BUTTON
// ════════════════════════════════════════════

function sayYes(){
  document.getElementById('yes-screen').classList.add('show');
  btnNo.style.display = 'none';
  launchConfetti();
}

const pool = ['🐸','🍄','🌻','✨','💚','⭐'];
function launchConfetti(){
  for(let i=0; i<80; i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.textContent = pool[Math.floor(Math.random()*pool.length)];
      el.style.left = (Math.random()*100)+'vw';
      el.style.setProperty('--cf', (2+Math.random()*2.5)+'s');
      el.style.setProperty('--cs', (Math.random()*720-360)+'deg');
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 5000);
    }, i*45);
  }
}

// ════════════════════════════════════════════
//  STARS & FIREFLIES
// ════════════════════════════════════════════

const sky = document.getElementById('sky');
for(let i=0; i<90; i++){
  const s = document.createElement('div');
  s.className = 'px-star';
  const sz = Math.random()<0.3 ? 2 : 1;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*55}%;--st:${1.5+Math.random()*4}s;--sd:${Math.random()*-5}s;`;
  sky.appendChild(s);
}

for(let i=0; i<25; i++){
  const f = document.createElement('div');
  f.className = 'firefly';
  const dur = 7+Math.random()*8;
  const blink = 1.8+Math.random()*2.5;
  const rng = ()=>(Math.random()>.5?1:-1)*(20+Math.random()*55)+'px';
  f.style.cssText = `left:${Math.random()*100}%;top:${10+Math.random()*65}%;
    --fd:${dur}s;--fb:${blink}s;
    --fx1:${rng()};--fy1:${rng()};--fx2:${rng()};--fy2:${rng()};--fx3:${rng()};--fy3:${rng()};
    animation-delay:${Math.random()*-dur}s,${Math.random()*-blink}s;`;
  document.getElementById('world').appendChild(f);
}

// ════════════════════════════════════════════
//  START GAME
// ════════════════════════════════════════════

function startGame(){
  frogChar.style.left = '-12vw';
  showScene(0);
}

// Load frog sprites and begin
loadFrogSprites();
</script>
