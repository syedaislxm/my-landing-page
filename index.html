<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Sprite Test</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #444; image-rendering: pixelated; }
    </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: '#2d6a35',
        pixelArt: true,
        scene: {
            preload: preload,
            create: create
        }
    };

    const game = new Phaser.Game(config);

    function preload() {
        this.load.spritesheet('frog', 'frog-sprites.png', {
            frameWidth: 170,
            frameHeight: 170
        });
    }

    function create() {
        // Row 0 - idle variants (frames 0-5)
        this.anims.create({
            key: 'idle',
            frames: [{ key: 'frog', frame: 0 }],
            frameRate: 1,
            repeat: -1
        });

        // Row 1 - walk left (frames 6-10, frame 11 is a plain walk)
        this.anims.create({
            key: 'walk_left',
            frames: this.anims.generateFrameNumbers('frog', { start: 6, end: 10 }),
            frameRate: 8,
            repeat: -1
        });

        // Row 2 - walk right (frames 12-16)
        this.anims.create({
            key: 'walk_right',
            frames: this.anims.generateFrameNumbers('frog', { start: 12, end: 16 }),
            frameRate: 8,
            repeat: -1
        });

        // Row 3 - expressions (frames 18-23)
        this.anims.create({
            key: 'happy',
            frames: [{ key: 'frog', frame: 19 }],
            frameRate: 1,
            repeat: -1
        });

        this.anims.create({
            key: 'surprised',
            frames: [{ key: 'frog', frame: 21 }],
            frameRate: 1,
            repeat: -1
        });

        // Place frogs
        const idleFrog = this.add.sprite(200, 300, 'frog').setScale(2);
        const walkFrog  = this.add.sprite(500, 300, 'frog').setScale(2);

        idleFrog.play('idle');
        walkFrog.play('walk_left');

        this.add.text(160, 420, 'Idle', { fontSize: '18px', fill: '#a8ff78' });
        this.add.text(450, 420, 'Walk Left', { fontSize: '18px', fill: '#a8ff78' });
    }
</script>
</body>
</html>
